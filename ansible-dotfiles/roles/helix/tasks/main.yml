- set_fact:
    config_dir: "{{ ansible_facts['env']['HOME'] }}/.config/helix"

- name: Install helix
  ansible.builtin.package:
    name: "{{ 'hx' if ansible_facts['os_family'] == 'Debian' else 'helix' }}"
    state: present
  become: "{{ ansible_facts['system'] != 'Darwin' }}"

- name: ensure config dir exists
  file:
    path: "{{ config_dir }}"
    state: directory

- name: copy files
  copy:
    src: "{{ item }}"
    dest: "{{ config_dir }}/{{ item }}"
  loop:
    - config.toml
    - languages.toml
