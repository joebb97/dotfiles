- name: Include OS-specific vars
  include_vars: "{{ lookup('first_found', params) }}"
  vars:
    params:
      files:
        - '{{ ansible_facts["system"] }}.yml'
      paths:
        - 'vars'

- name: Tap Homebrew repositories
  community.general.homebrew_tap:
    name: "{{ item }}"
    state: present
  loop: "{{ dev_tools_brew_taps }}"
  when: dev_tools_brew_taps is defined

- name: Install dev tools via package manager
  package:
    name: "{{ dev_tools_packages }}"
    state: present
  become: "{{ ansible_facts['system'] != 'Darwin' }}"
  tags: become
  when: dev_tools_packages | length > 0

- name: Install dev tools via cargo
  community.general.cargo:
    name: "{{ dev_tools_cargo_packages }}"
    state: present
    locked: true
  environment:
    PATH: "{{ ansible_env_path | default(ansible_facts['env']['PATH']) }}"
  when: dev_tools_cargo_packages | length > 0

- name: Install Homebrew casks
  community.general.homebrew_cask:
    name: "{{ dev_tools_brew_casks }}"
    state: present
    sudo_password: "{{ ansible_become_password | default(omit) }}"
  when: dev_tools_brew_casks | default([]) | length > 0
  tags: become

- name: Set Vagrant plugin installation state
  set_fact:
    dev_tools_install_vagrant_plugins: "{{ dev_tools_vagrant_plugins | default([]) | length > 0 }}"

- name: Check if Vagrant is installed
  command: which vagrant
  register: dev_tools_vagrant_check
  changed_when: false
  failed_when: false
  when: dev_tools_install_vagrant_plugins

- name: List installed Vagrant plugins
  command: vagrant plugin list
  register: dev_tools_vagrant_plugin_list
  changed_when: false
  when:
    - dev_tools_install_vagrant_plugins
    - dev_tools_vagrant_check.rc == 0

- name: Install Vagrant plugins
  command: "vagrant plugin install {{ item }}"
  loop: "{{ dev_tools_vagrant_plugins }}"
  when:
    - dev_tools_install_vagrant_plugins
    - dev_tools_vagrant_check.rc == 0
    - item not in dev_tools_vagrant_plugin_list.stdout

- name: install codex
  block:
    - name: Check if codex is installed
      command: which codex
      register: codex_check
      failed_when: false
      changed_when: false
    - name: Install codex
      shell: curl -fsSL https://chatgpt.com/codex/install.sh | sh
      when: codex_check.rc != 0

- name: install gh
  block:
    - name: Install gh mac
      package:
        name: gh
        state: present
      when: ansible_facts['system'] == 'Darwin'
    - name: Install gh fedora
      block:
        - name: Install dnf5 plugins
          ansible.builtin.dnf:
            name: dnf5-plugins
            state: present
        - name: Add github cli repo
          ansible.builtin.get_url:
            url: https://cli.github.com/packages/rpm/gh-cli.repo
            dest: /etc/yum.repos.d/gh-cli.repo
        - name: Install GitHub CLI
          ansible.builtin.dnf:
            name: gh
            state: present
      when: ansible_facts['pkg_mgr'] == 'dnf5'
      become: true
      tags: become
