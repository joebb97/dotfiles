- set_fact:
    config_dir: "{{ ansible_facts['env']['HOME'] }}/.config/mako"

- name: ensure config dir exists
  file:
    path: "{{ config_dir }}"
    state: directory

- name: copy config
  copy:
    src: config
    dest: "{{ config_dir }}/config"

- name: install mako
  package:
    name: mako
  become: true
  tags: become
